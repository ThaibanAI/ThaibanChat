<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="256" x2="512" y2="256">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="50%" stop-color="#0f1628"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="512" y2="512">
      <stop offset="0%" stop-color="#1a2a4a"/>
      <stop offset="100%" stop-color="#0d1528"/>
    </linearGradient>
    <linearGradient id="neonGlow" x1="0" y1="0" x2="512" y2="256">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#0055ff"/>
    </linearGradient>
    <linearGradient id="furGrad" x1="0" y1="0" x2="512" y2="512">
      <stop offset="0%" stop-color="#c8d0e0"/>
      <stop offset="100%" stop-color="#6a7a90"/>
    </linearGradient>
    <linearGradient id="cyberGrad" x1="0" y1="0" x2="512" y2="512">
      <stop offset="0%" stop-color="#1a3a6a"/>
      <stop offset="100%" stop-color="#0a1a3a"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="200" y2="0">
      <stop offset="0%" stop-color="#e0e8ff"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="248" fill="url(#bgGrad)" stroke="#00d4ff" stroke-width="3" opacity="0.8" filter="url(#softGlow)"/>

  <!-- Shield shape -->
  <path d="M256 40 L420 120 L420 280 C420 380 340 450 256 480 C172 450 92 380 92 280 L92 120 Z"
        fill="url(#shieldGrad)" stroke="url(#neonGlow)" stroke-width="3" opacity="0.9" filter="url(#glow)"/>

  <!-- Circuit lines left side -->
  <g stroke="#00d4ff" stroke-width="1.5" fill="none" opacity="0.5">
    <path d="M120 200 L140 200 L140 180 L160 180"/>
    <circle cx="160" cy="180" r="4" fill="#00d4ff"/>
    <path d="M100 300 L130 300 L130 260 L150 260"/>
    <circle cx="150" cy="260" r="3" fill="#00d4ff"/>
  </g>

  <!-- Circuit lines right side -->
  <g stroke="#0055ff" stroke-width="1.5" fill="none" opacity="0.4">
    <path d="M390 200 L370 200 L370 180 L350 180"/>
    <circle cx="350" cy="180" r="4" fill="#0055ff"/>
    <path d="M410 300 L380 300 L380 260 L360 260"/>
    <circle cx="360" cy="260" r="3" fill="#0055ff"/>
  </g>

  <!-- Wolf head - left realistic side -->
  <g>
    <!-- Main face shape left -->
    <path d="M196 160 L220 150 L220 200 L210 220 L200 240 L180 280 L160 260 L140 240 L130 200 Z"
          fill="url(#furGrad)"/>
    <!-- Ear left -->
    <path d="M180 125 L195 160 L165 160 Z" fill="url(#furGrad)"/>
    <!-- Inner ear -->
    <path d="M178 135 L190 158 L170 158 Z" fill="#3a4a5a"/>
    <!-- Eye left -->
    <ellipse cx="175" cy="195" rx="8" ry="5" fill="#00d4ff" filter="url(#glow)"/>
    <ellipse cx="175" cy="195" rx="3" ry="3" fill="white"/>
    <!-- Snout left -->
    <path d="M200 240 L220 270 L190 270 Z" fill="#8a9aaa"/>
    <!-- Fur texture lines -->
    <g stroke="#5a6a7a" stroke-width="1" fill="none" opacity="0.5">
      <path d="M185 170 L185 190"/>
      <path d="M195 180 L195 200"/>
      <path d="M170 210 L175 230"/>
    </g>
  </g>

  <!-- Wolf head - right cybernetic side -->
  <g>
    <!-- Main face shape right -->
    <path d="M256 160 L292 150 L316 160 L330 200 L320 240 L300 280 L280 260 L270 240 L260 220 Z"
          fill="url(#cyberGrad)" stroke="#00d4ff" stroke-width="0.5" opacity="0.9"/>
    <!-- Ear right -->
    <path d="M270 125 L290 160 L256 160 Z" fill="url(#cyberGrad)" stroke="#00d4ff" stroke-width="0.5"/>
    <!-- Cyber ear glow -->
    <path d="M272 135 L285 158 L262 158 Z" fill="#0055ff" opacity="0.4"/>
    <!-- Cyber eye -->
    <rect x="258" y="190" width="18" height="10" rx="3" fill="#00d4ff" filter="url(#glow)"/>
    <rect x="262" y="193" width="10" height="4" rx="1" fill="white"/>
    <!-- Cyber snout -->
    <path d="M256 240 L276 270 L256 270 Z" fill="#0a1a3a" stroke="#00d4ff" stroke-width="0.5"/>
    <!-- Circuit traces on cyber face -->
    <g stroke="#00d4ff" stroke-width="1" fill="none" opacity="0.7">
      <path d="M265 170 L265 180 L275 185"/>
      <circle cx="275" cy="185" r="2" fill="#00d4ff"/>
      <path d="M310 210 L300 215 L300 230"/>
      <circle cx="300" cy="230" r="2" fill="#00d4ff"/>
    </g>
  </g>

  <!-- Center divider line (split between organic and cyber) -->
  <line x1="256" y1="130" x2="256" y2="270" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
  <circle cx="256" cy="130" r="2" fill="#00d4ff"/>
  <circle cx="256" cy="200" r="2" fill="#00d4ff"/>
  <circle cx="256" cy="270" r="2" fill="#00d4ff"/>

  <!-- Lock icon at center -->
  <g transform="translate(236, 275)" filter="url(#glow)">
    <rect x="0" y="12" width="40" height="28" rx="4" fill="none" stroke="#00d4ff" stroke-width="2"/>
    <path d="M8 12 L8 8 C8 2 16 -2 20 -2 C24 -2 32 2 32 8 L32 12" fill="none" stroke="#00d4ff" stroke-width="2.5"/>
    <circle cx="20" cy="26" r="4" fill="#00d4ff"/>
  </g>

  <!-- Energy arc right side -->
  <g filter="url(#softGlow)">
    <path d="M380 200 C420 220 430 300 380 350" stroke="#00d4ff" stroke-width="2" fill="none" opacity="0.6"/>
    <path d="M375 190 C430 210 450 310 390 360" stroke="#0055ff" stroke-width="1.5" fill="none" opacity="0.3"/>
  </g>

  <!-- Decorative nodes -->
  <circle cx="440" cy="150" r="3" fill="#00d4ff" opacity="0.5" filter="url(#glow)"/>
  <circle cx="460" cy="200" r="2" fill="#0055ff" opacity="0.4"/>
  <circle cx="80" cy="350" r="3" fill="#00d4ff" opacity="0.3"/>
  <circle cx="120" cy="420" r="2" fill="#0055ff" opacity="0.4"/>

  <!-- Thaiban AI text -->
  <g transform="translate(186, 420)">
    <!-- "Thaiban" -->
    <text x="20" y="0" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="26"
          fill="url(#textGrad)" font-style="italic" letter-spacing="2" filter="url(#glow)">
      Thaiban
    </text>
    <!-- "AI" larger -->
    <text x="4" y="28" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="20"
          fill="#00d4ff" text-anchor="middle" letter-spacing="4" filter="url(#glow)">
      AI
    </text>
  </g>
</svg>
